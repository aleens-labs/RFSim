server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=30s;

  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), payment=(), usb=()" always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

  location ~* \.wasm$ {
    default_type application/wasm;
    try_files $uri =404;
  }

  location ~* \.mjs$ {
    default_type application/javascript;
    try_files $uri =404;
  }

  location = /index.html {
    expires -1;
  }

  location = /api {
    return 404;
  }

  location /api/ {
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header X-Powered-By;
  }

  location = /certs {
    return 404;
  }

  location ^~ /certs/ {
    return 404;
  }

  location ~* (^|/)(?:\.env|.*\.pem|.*\.key|.*\.crt|.*\.p12|.*\.pfx|.*\.jks|.*\.keystore|id_rsa|id_dsa|id_ecdsa|id_ed25519)(?:$|[?#]) {
    return 404;
  }

  location ~ /\.(?!well-known/) {
    return 404;
  }

  location /genai-mil/v1/ {
    proxy_pass https://api.genai.mil/v1/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api.genai.mil;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header X-Powered-By;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
